name: Build Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set build variables
        id: vars
        run: |
          echo "tag=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo }}:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ steps.vars.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract binary from image
        run: |
          IMAGE="ghcr.io/${{ steps.vars.outputs.repo }}:${{ steps.vars.outputs.tag }}"
          docker pull "$IMAGE"
          docker create --name tmp_container "$IMAGE"
          docker cp tmp_container:/app/CBCTF ./CBCTF
          docker rm tmp_container

      - name: Package archives
        run: |
          tar -czf CBCTF-linux-amd64.tar.gz CBCTF
          zip CBCTF-linux-amd64.zip CBCTF

      - name: Delete previous release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          if [ -n "$LATEST" ]; then
            gh release delete "$LATEST" --yes --cleanup-tag
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          gh release create "$TAG" CBCTF-linux-amd64.tar.gz CBCTF-linux-amd64.zip \
            --title "$TAG" \
            --notes "Auto build from commit $(git rev-parse --short HEAD)
