name: Build and Release

on:
  push:
    branches:
      - main # 监听 main 分支上的提交，或者你可以根据需要修改为其他分支

jobs:
  build:
    runs-on: ubuntu-latest  # 使用最新版本的 Ubuntu 运行构建

    strategy:
      matrix:
        # 构建多种架构的二进制文件
        architecture: [amd64, arm64]  # 可以根据需要添加更多架构

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v2

      # Step 2: Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.23.2'  # 这里可以设置 Go 版本，根据你的需求修改

      # Step 3: Install dependencies (libpcap-dev)
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpcap-dev

      # Step 4: Set GOARCH for the corresponding architecture
      - name: Set GOARCH
        run: echo "GOARCH=${{ matrix.architecture }}" >> $GITHUB_ENV

      # Step 5: Build Go binary for the selected architecture
      - name: Build Go binary
        run: |
          GOOS=linux GOARCH=$GOARCH go build -o myapp-${{ matrix.architecture }} .

      # Step 6: Upload the built binaries as release assets
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            myapp-amd64
            myapp-arm64
            myapp-armv7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
