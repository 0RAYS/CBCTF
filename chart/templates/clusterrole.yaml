---
# ClusterRole: permissions the CBCTF app needs at runtime
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cbctf.fullname" . }}
  labels:
    {{- include "cbctf.labels" . | nindent 4 }}
rules:
  # ── Namespace-scoped resources ────────────────────────────────────────────
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "list", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "deletecollection"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get"]

  # ── Cluster-scoped resources ─────────────────────────────────────────────
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list"]

  # ── Jobs ─────────────────────────────────────────────────────────────────
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create"]

  # ── NetworkPolicy ────────────────────────────────────────────────────────
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "deletecollection"]

  # ── EndpointSlices ───────────────────────────────────────────────────────
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["deletecollection"]

  # ── Permission self-check ────────────────────────────────────────────────
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews"]
    verbs: ["create"]

  # ── Multus CNI (NetworkAttachmentDefinitions) ────────────────────────────
  - apiGroups: ["k8s.cni.cncf.io"]
    resources: ["network-attachment-definitions"]
    verbs: ["create", "get", "delete", "deletecollection"]

  # ── KubeOVN resources (VPC networking mode) ──────────────────────────────
  - apiGroups: ["kubeovn.io"]
    resources: ["subnets"]
    verbs: ["create", "get", "delete", "deletecollection"]
  - apiGroups: ["kubeovn.io"]
    resources: ["vpcs"]
    verbs: ["create", "deletecollection"]
  - apiGroups: ["kubeovn.io"]
    resources: ["ips"]
    verbs: ["deletecollection"]
  - apiGroups: ["kubeovn.io"]
    resources: ["iptables-eips"]
    verbs: ["create", "get", "deletecollection"]
  - apiGroups: ["kubeovn.io"]
    resources: ["iptables-dnat-rules", "iptables-snat-rules", "vpc-nat-gateways"]
    verbs: ["create", "deletecollection"]
