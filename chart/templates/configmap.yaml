apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cbctf.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cbctf.labels" . | nindent 4 }}
data:
  config.yaml: |
    host: {{ .Values.cbctf.host | quote }}
    path: /app/data

    log:
      level: {{ .Values.cbctf.log.level | quote }}
      save: {{ .Values.cbctf.log.save }}

    asynq:
      log:
        level: {{ .Values.cbctf.asynq.log.level | quote }}
      queues:
        victim: {{ .Values.cbctf.asynq.queues.victim }}
        traffic: {{ .Values.cbctf.asynq.queues.traffic }}
        generator: {{ .Values.cbctf.asynq.queues.generator }}
        attachment: {{ .Values.cbctf.asynq.queues.attachment }}
        email: {{ .Values.cbctf.asynq.queues.email }}
        webhook: {{ .Values.cbctf.asynq.queues.webhook }}
        image: {{ .Values.cbctf.asynq.queues.image }}

    gin:
      mode: {{ .Values.cbctf.gin.mode | quote }}
      host: {{ .Values.cbctf.gin.host | quote }}
      port: {{ .Values.cbctf.gin.port }}
      upload:
        picture: {{ .Values.cbctf.gin.upload.picture }}
        challenge: {{ .Values.cbctf.gin.upload.challenge }}
        writeup: {{ .Values.cbctf.gin.upload.writeup }}
      proxies:
        {{- range .Values.cbctf.gin.proxies }}
        - {{ . | quote }}
        {{- end }}
      ratelimit:
        global: {{ .Values.cbctf.gin.ratelimit.global }}
        whitelist:
          {{- range .Values.cbctf.gin.ratelimit.whitelist }}
          - {{ . | quote }}
          {{- end }}
      origins:
        {{- range .Values.cbctf.gin.origins }}
        - {{ . | quote }}
        {{- end }}
      log:
        whitelist:
          {{- range .Values.cbctf.gin.log.whitelist }}
          - {{ . | quote }}
          {{- end }}
      jwt:
        secret: {{ .Values.cbctf.gin.jwt.secret | quote }}
      metrics:
        whitelist:
          {{- range .Values.cbctf.gin.metrics.whitelist }}
          - {{ . | quote }}
          {{- end }}

    gorm:
      postgres:
        host: {{ printf "%s.%s" (include "cbctf.postgres.host" .) .Release.Namespace | quote }}
        port: {{ .Values.postgres.service.port }}
        user: {{ .Values.postgres.auth.username | quote }}
        pwd: {{ .Values.postgres.auth.password | quote }}
        db: {{ .Values.postgres.auth.database | quote }}
        sslmode: {{ .Values.cbctf.gorm.postgres.sslmode }}
        mxopen: {{ .Values.cbctf.gorm.postgres.mxopen }}
        mxidle: {{ .Values.cbctf.gorm.postgres.mxidle }}
      log:
        level: {{ .Values.cbctf.gorm.log.level | quote }}

    redis:
      host: {{ printf "%s.%s" (include "cbctf.redis.host" .) .Release.Namespace | quote }}
      port: {{ .Values.redis.service.port }}
      pwd: {{ .Values.redis.auth.password | quote }}

    k8s:
      namespace: {{ .Release.Namespace | quote }}
      capture: {{ .Values.cbctf.k8s.capture | quote }}
      frp:
        on: {{ .Values.cbctf.k8s.frp.on }}
        frpc: {{ .Values.cbctf.k8s.frp.frpc | quote }}
        nginx: {{ .Values.cbctf.k8s.frp.nginx | quote }}
        frps: {{ toYaml .Values.cbctf.k8s.frp.frps | nindent 10 }}

    cheat:
      ip:
        whitelist:
          {{- range .Values.cbctf.cheat.ip.whitelist }}
          - {{ . | quote }}
          {{- end }}

    webhook:
      whitelist: {{ toYaml .Values.cbctf.webhook.whitelist | nindent 8 }}

    registration:
      enabled: {{ .Values.cbctf.registration.enabled }}
      default_group: {{ .Values.cbctf.registration.default_group }}
