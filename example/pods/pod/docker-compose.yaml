services:
  web:
    container_name: web
    image: docker.0rays.club/cbctf/test-web:20250717
    cpus: 0.5
    mem_limit: 256m
    working_dir: /app
    command: ["python", "app.py"]
    ports:
      - "5000:5000"
    environment:
      APP_ENV: production
      MYSQL_HOST: 127.0.0.1
      MYSQL_DATABASE: testdb
      FLAG_0: uuid{}
      FLAG_1: dynamic{this_is_a_dynamic_flag}
      FLAG_2: static{this_is_a_static_flag}
    x-volumes:
      - path: /flag
        content: dynamic{this_is_a_file_flag}
    x-kubevirt: false
    x-boot:
      bootloader: efi
      secure_boot: false
    x-cloudinit:
      users:
        - name: ctf
          gecos: CTF Player
          groups:
            - sudo
            - docker
          sudo:
            - ALL=(ALL) NOPASSWD:ALL
          shell: /bin/bash
          homedir: /home/ctf
          lock_passwd: false
          passwd: "$6$rounds=4096$saltstring$examplehash"
          plain_text_passwd: changeme
          ssh_authorized_keys:
            - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExampleUserKey ctf@example
          no_create_home: false
          system: false
      groups:
        - name: docker
          members:
            - ctf
      write_files:
        - path: /etc/motd
          content: |
            Welcome to CBCTF.
            This file was written by cloud-init.
          owner: root:root
          permissions: "0644"
          encoding: text/plain
          append: false
          defer: false
      ssh_authorized_keys:
        - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExampleRootKey root@example

  db:
    container_name: db
    image: docker.0rays.club/library/mysql:8.0
    cpus: 0.25
    mem_limit: 512m
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: testdb
    x-kubevirt: false
    x-boot:
      bootloader: bios
