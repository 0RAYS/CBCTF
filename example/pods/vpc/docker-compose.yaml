services:
  web1:
    container_name: web1
    image: docker.0rays.club/cbctf/test-web:20250717
    cpus: 0.5
    mem_limit: 256m
    working_dir: /app
    command: ["python", "app.py"]
    ports:
      - "5000:5000"
    environment:
      APP_ENV: production
      FLAG_1: uuid{}
      FLAG_2: leet{this_is_a_leet_flag}
    x-volumes:
      - path: /flag
        content: leet{this_is_a_file_flag}
    x-kubevirt: true
    x-boot:
      bootloader: efi
      secure_boot: false
    x-cloudinit:
      users:
        - name: ctf
          gecos: CTF Player
          groups:
            - sudo
            - docker
          sudo:
            - ALL=(ALL) NOPASSWD:ALL
          shell: /bin/bash
          homedir: /home/ctf
          lock_passwd: false
          passwd: "$6$rounds=4096$saltstring$examplehash"
          plain_text_passwd: changeme
          ssh_authorized_keys:
            - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExampleUserKey ctf@example
          no_create_home: false
          system: false
      groups:
        - name: docker
          members:
            - ctf
      write_files:
        - path: /etc/motd
          content: |
            Welcome to CBCTF web1.
            This file was written by cloud-init.
          owner: root:root
          permissions: "0644"
          encoding: text/plain
          append: false
          defer: false
      ssh_authorized_keys:
        - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExampleRootKey root@example
    networks:
      network1:
        ipv4_address: 192.168.0.2
        mac_address: "00:00:00:00:01:01"
      network2:
        ipv4_address: 192.168.1.2
        mac_address: "00:00:00:00:01:02"

  web2:
    container_name: web2
    image: docker.0rays.club/cbctf/test-web:20250717
    cpus: 0.5
    mem_limit: 256m
    working_dir: /app
    command: ["python", "app.py"]
    environment:
      APP_ENV: production
      FLAG_3: uuid{}
    x-volumes:
      - path: /flag
        content: leet{this_is_a_file_flag}
    x-kubevirt: true
    x-boot:
      bootloader: efi
      secure_boot: false
    x-cloudinit:
      users:
        - name: ctf
          gecos: CTF Player
          groups:
            - sudo
          sudo:
            - ALL=(ALL) NOPASSWD:ALL
          shell: /bin/bash
          homedir: /home/ctf
          lock_passwd: false
          passwd: "$6$rounds=4096$saltstring$examplehash"
          plain_text_passwd: changeme
          ssh_authorized_keys:
            - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExampleUserKey ctf@example
          no_create_home: false
          system: false
      groups:
        - name: sudo
          members:
            - ctf
      write_files:
        - path: /etc/motd
          content: |
            Welcome to CBCTF web2.
          owner: root:root
          permissions: "0644"
          encoding: text/plain
          append: false
          defer: false
      ssh_authorized_keys:
        - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExampleRootKey root@example
    networks:
      network2:
        ipv4_address: 192.168.1.3
        mac_address: "00:00:00:00:02:01"
      network3:
        ipv4_address: 192.168.2.3
        mac_address: "00:00:00:00:02:02"

  web3:
    container_name: web3
    image: docker.0rays.club/cbctf/test-web:20250717
    cpus: 0.5
    mem_limit: 256m
    working_dir: /app
    command: ["python", "app.py"]
    environment:
      APP_ENV: production
      FLAG_5: uuid{}
      FLAG_6: static{this_is_a_static_flag}
    x-volumes:
      - path: /flag
        content: leet{this_is_a_file_flag}
    x-kubevirt: false
    x-boot:
      bootloader: bios
    x-cloudinit:
      users:
        - name: ctf
          gecos: CTF Player
          groups:
            - users
          sudo:
            - ALL=(ALL) NOPASSWD:ALL
          shell: /bin/bash
          homedir: /home/ctf
          lock_passwd: false
          passwd: "$6$rounds=4096$saltstring$examplehash"
          plain_text_passwd: changeme
          ssh_authorized_keys:
            - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExampleUserKey ctf@example
          no_create_home: false
          system: false
      groups:
        - name: users
          members:
            - ctf
      write_files:
        - path: /etc/motd
          content: |
            Welcome to CBCTF web3.
          owner: root:root
          permissions: "0644"
          encoding: text/plain
