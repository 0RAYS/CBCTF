        - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExampleRootKey root@example
    networks:
      network3:
        ipv4_address: 192.168.2.4
        mac_address: "00:00:00:00:03:01"

networks:
  network1:
    external: true
    ipam:
      config:
        - subnet: 192.168.0.0/24
          gateway: 192.168.0.1
  network2:
    ipam:
      config:
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.1
  network3:
    ipam:
      config:
        - subnet: 192.168.2.0/24
          gateway: 192.168.2.1
