services:
  service1:
    container_name: service1
    image: nicolaka/netshoot:latest
    ports:
      - "80:80/tcp"
    cpus: 0.5
    mem_limit: 500m
    environment:
      - FLAG=static{static_flag}
    volumes:
      - FLAG_0:/flag
    working_dir: /root
    command:
      - "sleep"
      - "infinity"
    networks:
      network1:
        ipv4_address: 192.168.0.2

  service2:
    container_name: service2
    image: nicolaka/netshoot:latest
    cpus: 0.5
    mem_limit: 500m
    environment:
      - FLAG=dynamic{dynamic_flag}
    volumes:
      - FLAG_1:/flag
    working_dir: /root
    command:
      - "sleep"
      - "infinity"
    networks:
      network1:
        ipv4_address: 192.168.0.3
      network2:
        ipv4_address: 192.168.1.3

  service3:
    container_name: service3
    cpus: 0.5
    mem_limit: 500m
    environment:
      - FLAG=uuid{}
    volumes:
      - FLAG_2:/flag
    working_dir: /root
    command:
      - "sleep"
      - "infinity"
    networks:
      network2:
        ipv4_address: 192.168.1.4
      network3:
        ipv4_address: 192.168.2.4

volumes:
  FLAG_0:
    labels:
      - value=static{static_flag}
  FLAG_1:
    labels:
      - value=dynamic{dynamic_flag}
  FLAG_2:
    labels:
      - value=uuid{}

networks:
  network1:
    external: true
    ipam:
      config:
        - subnet: 192.168.0.0/24
          gateway: 192.168.0.1

  network2:
    ipam:
      config:
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.1

  network3:
    ipam:
      config:
        - subnet: 192.168.2.0/24
          gateway: 192.168.2.1
