host: http://127.0.0.1:8000
# Data path and NFS mount path if needed
path: ./data
log:
  # DEBUG INFO WARNING ERROR
  level: info
  save: true
asynq:
  log:
    # DEBUG INFO WARNING ERROR
    level: warning
  # Concurrent workers
  concurrency: 50
gin:
  mode: release
  host: 127.0.0.1
  port: 8000
  # Trusted proxy servers
  proxies:
    - 127.0.0.1
  upload:
    # Size limited
    max: 8
  ratelimit:
    # Global rate limit
    global: 100
    # Request without rate limited
    whitelist:
      - ::1
      - 127.0.0.1
  cors:
    - http://127.0.0.1:8000
  log:
    # Request without logging
    whitelist:
      - /metrics
      - /platform/*filepath
  jwt:
    # will be ignored when static is false, use cron job to update randomly
    secret: 0rays-jbnrz
    static: false
gorm:
  mysql:
    host: 127.0.0.1
    port: 3306
    user: cbctf
    pwd: password
    db: cbctf
    mxopen: 100
    mxidle: 10
  log:
    # INFO WARNING ERROR SILENT
    level: silent
redis:
  host: 127.0.0.1
  port: 6379
  pwd: password
k8s:
  # Kubeconfig path
  config: ./admin.yaml
  # Also as prefix of resources
  namespace: cbctf
  # Maybe your k8s nodes cidr
  # https://kubeovn.github.io/docs/stable/vpc/vpc/#_2
  external_network:
    cidr: 192.168.0.0/16
    gateway: 192.168.0.1
    interface: eth0
    exclude_ips:
      - 192.168.0.1
      - 192.168.0.254
  # Docker image
  tcpdump: nicolaka/netshoot:latest
  frp:
    on: false
    # Docker image
    frpc: snowdreamtech/frpc:latest
    nginx: nginx:latest
    frps:
      - host: example.com
        port: 7000
        token: token
        allowed:
          - from: 10000
            to: 30000
            exclude:
              - 20000
          - from: 40000
            to: 60000
            exclude:
              - 50000
  # (len(nodes) * generator_worker) pods for each dynamic challenge
  generator_worker: 2
nfs:
  server: 127.0.0.1
  # Accessible path (RW) in NFS server
  path: /mnt/data
  # Gi, Mi
  storage: 10Gi
cheat:
  ip:
    whitelist:
      - 127.0.0.1
      - ::1
      - 10.0.0.0/8
      - 192.168.0.0/16
      - 172.16.0.0/12
      - 100.64.0.0/10
# GeoCityDB Path
# https://github.com/wp-statistics/GeoLite2-City
geocity_db: ./data/GeoLite2-City.mmdb
