backend: "http://127.0.0.1:8000"
# CORS
frontend: "http://127.0.0.1:3000"
# Data path and NFS mount path if needed
path: "./data"
log:
  # DEBUG INFO WARNING ERROR
  level: "info"
  save: true
gin:
  mode: "release"
  host: "127.0.0.1"
  port: 8000
  # Static Resources URI
  static_uri: "platform"
  # Trusted proxy servers
  proxies:
    - "10.0.0.1"
  upload:
    # Size limited
    max: 8
  rate:
    # Request without rate limited
    whitelist:
      - "::1"
      - "127.0.0.1"
  log:
    # Request without logging
    whitelist:
      - "/metrics"
gorm:
  mysql:
    host: "127.0.0.1"
    port: 3306
    user: "cbctf"
    pwd: "password"
    db: "cbctf"
    mxopen: 100
    mxidle: 10
  log:
    # INFO WARNING ERROR SILENT
    level: "silent"
redis:
  host: "127.0.0.1"
  port: 6379
  pwd: "password"
k8s:
  # Kubeconfig path
  config: "./admin.conf"
  # Also as prefix of resources
  namespace: "cbctf"
  # Maybe your k8s nodes cidr
  # https://kubeovn.github.io/docs/stable/vpc/vpc/#_2
  external_network:
    cidr: 192.168.0.0/16
    gateway: 192.168.0.1
    interface: "eth0"
    exclude_ips:
      - "192.168.0.1"
      - "192.168.0.254"
  # Docker image
  tcpdump: "nicolaka/netshoot:latest"
  frpc:
    on: false
    # Docker image
    image: "snowdreamtech/frpc:latest"
    frps:
      - host: "example.com"
        port: "7000"
        token: "token"
        allowed_ports:
          - from: 10000
            to: 30000
            exclude:
              - 20000
          - from: 40000
            to: 60000
            exclude:
              - 50000
  # Nodes of k8s cluster, used for external service, will auto get from k8s when run `./CBCTF k8s init`
  nodes:
    - "192.168.0.1"
  # (len(nodes) * generator_worker) pods for each dynamic challenge
  generator_worker: 2
nfs:
  server: 127.0.0.1
  # Accessible path (RW) in NFS server
  path: /mnt/data
  # Gi, Mi
  storage: 10Gi
email:
  senders:
    - addr: "noreply@example.com"
      pwd: "password"
      host: "smtp.example.com"
      port: 25
